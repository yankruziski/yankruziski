name: Update Market Pulse

on:
  schedule:
    # 22:00 UTC = 19:00 BRT (after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch quotes and update README
        run: python scripts/update_market.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update market pulse [skip ci]"
          git push
